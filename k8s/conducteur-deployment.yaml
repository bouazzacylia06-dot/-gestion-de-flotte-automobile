apiVersion: apps/v1
kind: Deployment
metadata:
  name: conducteur-service
  namespace: conducteur-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: conducteur-service
      version: v1.0.0
  template:
    metadata:
      labels:
        app: conducteur-service
        version: v1.0.0
    spec:
      containers:
        - name: conducteur-service
          image: conducteur-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: APP_PORT
              value: "3001"
            - name: OTEL_SERVICE_NAME
              value: "conducteur-service"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector-opentelemetry-collector.flotte-observability.svc:4318"
            - name: KEYCLOAK_URL
              value: "http://192.168.49.1:8080"
            - name: KEYCLOAK_REALM
              value: "flotte"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: url
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
