# nginx/canary.conf — Load balancing 80/20 (stable vs canary)
# Utilisé uniquement si vehicle-service-canary est démarré
upstream vehicle_service {
  server vehicle-service:3000 weight=8;         # 80% trafic → version stable
  server vehicle-service-canary:3000 weight=2;  # 20% trafic → version canary
  keepalive 10;
}

server {
  listen 8090;
  server_name _;

  location /health {
    return 200 '{"status":"ok","service":"nginx-canary"}';
    add_header Content-Type application/json;
  }

  location / {
    proxy_pass         http://vehicle_service;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   Connection        "";
    add_header         X-Served-By       $upstream_addr;
    add_header         X-Canary-Version  "active";
  }
}
