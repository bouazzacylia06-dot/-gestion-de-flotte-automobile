---
name: CI/CD Gestion Flotte

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/gestion-flotte

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: vehicule
            context: ./services/vehicule-service
            image_suffix: vehicule
          - service: conducteur
            context: ./services/conducteur-service
            image_suffix: conducteur
          - service: maintenance
            context: ./services/maintenance-service
            image_suffix: maintenance
          - service: localisation
            context: ./services/localisation-service
            image_suffix: localisation
          - service: evenement
            context: ./services/evenement-service
            image_suffix: evenement
          - service: gateway
            context: .
            image_suffix: gateway
            dockerfile: gestion-flotte.Dockerfile
          - service: frontend
            context: ./frontend
            image_suffix: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.image_suffix }}
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile || format('{0}/Dockerfile', matrix.context) }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: vehicule
            image_suffix: vehicule
          - service: conducteur
            image_suffix: conducteur
          - service: localisation
            image_suffix: localisation
          - service: maintenance
            image_suffix: maintenance
          - service: evenement
            image_suffix: evenement
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and run tests
        run: |
          IMAGE="${{ env.IMAGE_PREFIX }}-${{ matrix.image_suffix }}:sha-$(git rev-parse --short HEAD)"
          docker pull "$IMAGE"
          docker run --rm "$IMAGE" sh -c "npm ci && npm test -- --watchAll=false --passWithNoTests"

  security-scan:
    name: Security ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [build, test]
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: vehicule
            image_suffix: vehicule
          - service: conducteur
            image_suffix: conducteur
          - service: localisation
            image_suffix: localisation
          - service: maintenance
            image_suffix: maintenance
          - service: evenement
            image_suffix: evenement
    steps:
      - uses: actions/checkout@v4

      - id: image_ref
        run: |
          echo "ref=${{ env.IMAGE_PREFIX }}-${{ matrix.image_suffix }}:sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ steps.image_ref.outputs.ref }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif

  deploy-dev:
    name: Deploy Dev
    runs-on: ubuntu-latest
    needs: [build, test, security-scan]
    if: github.ref == 'refs/heads/main'
    environment: development
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo '${{ secrets.KUBE_CONFIG }}' | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify cluster access
        run: kubectl get nodes

      - name: Helm deploy
        run: |
          IMAGE_TAG="sha-$(git rev-parse --short HEAD)"
          helm upgrade --install flotte ./helm/fleet-app \
            --namespace dev \
            --create-namespace \
            --wait \
            --timeout 10m \
            --set global.imagePullPolicy=Always \
            --set services.vehicule.image.tag="${IMAGE_TAG}" \
            --set services.conducteur.image.tag="${IMAGE_TAG}" \
            --set services.maintenance.image.tag="${IMAGE_TAG}" \
            --set services.localisation.image.tag="${IMAGE_TAG}" \
            --set services.evenement.image.tag="${IMAGE_TAG}"
