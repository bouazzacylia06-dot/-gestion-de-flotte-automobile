--- 
# CI/CD Pipeline Gestion Flotte (yamllint 100% Linux \\n + React ready)

name: CI/CD Gestion Flotte

on:
  push:
    branches: [main,'feature/**']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/gestion-flotte

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service: [vehicles,conducteurs,localisation,maintenance,evenements,frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=pr
      - uses: docker/build-push-action@v6
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service: [vehicles,conducteurs,localisation,maintenance,evenements]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          IMAGE=\"${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}\"
          docker pull \"$IMAGE\"
          docker run --rm \"$IMAGE\" sh -c \"npm ci && npm test -- --watchAll=false\"

  security-scan:
    name: Security ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [build,test]
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service: [vehicles,conducteurs,localisation,maintenance,evenements]
    steps:
      - uses: actions/checkout@v4
      - id: image_ref
        run: echo \"ref=${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}\" >> $GITHUB_OUTPUT
      - uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ steps.image_ref.outputs.ref }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: 'CRITICAL,HIGH'
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif

  deploy-dev:
    name: Deploy Dev
    runs-on: ubuntu-latest
    needs: [build,test,security-scan]
    if: github.ref == 'refs/heads/main'
    environment: development
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      - uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0
      - run: |
          mkdir -p ~/.kube
          echo '${{ secrets.KUBE_CONFIG }}' | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
      - run: kubectl get nodes
      - run: |
          helm upgrade --install flotte ./k8s/helm-chart --namespace dev --create-namespace --wait --timeout 5m --set image.tag=${{ github.sha }}

