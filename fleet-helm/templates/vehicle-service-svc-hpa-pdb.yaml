{{- if .Values.vehicleService.enabled -}}
# ── Service ───────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: vehicle-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fleet.serviceLabels" . | nindent 4 }}
    app.kubernetes.io/name: vehicle-service
    app.kubernetes.io/component: microservice
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vehicle-service
  ports:
    - name: http
      port: {{ .Values.vehicleService.port }}
      targetPort: http
      protocol: TCP
---
# ── HorizontalPodAutoscaler ──────────────────────────────────────────────
{{- if .Values.vehicleService.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vehicle-service-hpa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fleet.serviceLabels" . | nindent 4 }}
    app.kubernetes.io/name: vehicle-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vehicle-service
  minReplicas: {{ .Values.vehicleService.hpa.minReplicas }}
  maxReplicas: {{ .Values.vehicleService.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.vehicleService.hpa.cpuUtilization }}
{{- end }}
---
# ── PodDisruptionBudget ───────────────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vehicle-service-pdb
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fleet.serviceLabels" . | nindent 4 }}
    app.kubernetes.io/name: vehicle-service
spec:
  minAvailable: {{ .Values.vehicleService.pdb.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: vehicle-service
{{- end }}
