{{- if .Values.keycloak.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fleet.serviceLabels" . | nindent 4 }}
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: keycloak
spec:
  replicas: {{ .Values.keycloak.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
      app.kubernetes.io/component: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/component: keycloak
        app.kubernetes.io/part-of: fleet-management
    spec:
      serviceAccountName: {{ include "fleet.serviceAccountName" . }}
      containers:
        - name: keycloak
          image: "{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}"
          imagePullPolicy: {{ .Values.keycloak.image.pullPolicy | default .Values.global.imagePullPolicy }}
          args:
            - start-dev
          ports:
            - name: http
              containerPort: {{ .Values.keycloak.port }}
              protocol: TCP
          env:
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ include "fleet.keycloakSecretName" . }}
                  key: KEYCLOAK_ADMIN
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fleet.keycloakSecretName" . }}
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HOSTNAME_STRICT_HTTPS
              value: "false"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_DB
              value: "postgres"
            - name: KC_DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "fleet.postgresSecretName" . }}
                  key: DATABASE_URL
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "fleet.postgresSecretName" . }}
                  key: POSTGRES_USER
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fleet.postgresSecretName" . }}
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: {{ .Values.keycloak.resources.requests.cpu | quote }}
              memory: {{ .Values.keycloak.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.keycloak.resources.limits.cpu | quote }}
              memory: {{ .Values.keycloak.resources.limits.memory | quote }}
          readinessProbe:
            httpGet:
              path: /health/ready
              port: {{ .Values.keycloak.port }}
            initialDelaySeconds: {{ .Values.keycloak.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.keycloak.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.keycloak.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.keycloak.readinessProbe.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: {{ .Values.keycloak.port }}
            initialDelaySeconds: {{ .Values.keycloak.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.keycloak.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.keycloak.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.keycloak.livenessProbe.failureThreshold }}
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fleet.serviceLabels" . | nindent 4 }}
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: keycloak
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: keycloak
  ports:
    - name: http
      port: {{ .Values.keycloak.port }}
      targetPort: http
      protocol: TCP
{{- end }}
