{{- if .Values.kafka.enabled -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fleet.serviceLabels" . | nindent 4 }}
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: kafka
spec:
  serviceName: kafka
  replicas: {{ .Values.kafka.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
      app.kubernetes.io/component: kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka
        app.kubernetes.io/component: kafka
        app.kubernetes.io/part-of: fleet-management
    spec:
      serviceAccountName: {{ include "fleet.serviceAccountName" . }}
      containers:
        - name: kafka
          image: "{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          imagePullPolicy: {{ .Values.kafka.image.pullPolicy | default .Values.global.imagePullPolicy }}
          ports:
            - name: broker
              containerPort: {{ .Values.kafka.port }}
              protocol: TCP
            - name: controller
              containerPort: {{ .Values.kafka.controllerPort }}
              protocol: TCP
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@kafka:9093"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: CLUSTER_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "fleet.postgresSecretName" . }}
                  key: POSTGRES_DB
                  optional: true
          resources:
            requests:
              cpu: {{ .Values.kafka.resources.requests.cpu | quote }}
              memory: {{ .Values.kafka.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.kafka.resources.limits.cpu | quote }}
              memory: {{ .Values.kafka.resources.limits.memory | quote }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.kafka.port }}
            initialDelaySeconds: {{ .Values.kafka.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.kafka.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.kafka.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.kafka.readinessProbe.failureThreshold }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.kafka.port }}
            initialDelaySeconds: {{ .Values.kafka.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.kafka.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.kafka.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.kafka.livenessProbe.failureThreshold }}
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
      {{- if not .Values.kafka.persistence.enabled }}
      volumes:
        - name: kafka-data
          emptyDir: {}
      {{- end }}
  {{- if .Values.kafka.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
        labels:
          app.kubernetes.io/name: kafka
          app.kubernetes.io/component: kafka
      spec:
        accessModes:
          - {{ .Values.kafka.persistence.accessMode }}
        {{- if .Values.kafka.persistence.storageClass }}
        storageClassName: {{ .Values.kafka.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.kafka.persistence.size }}
  {{- end }}
{{- end }}
