apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fleet.postgresSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fleet.labels" . | nindent 4 }}
type: Opaque
data:
  # Values must be base64 encoded. Override via --set secrets.postgres.user=<b64>
  POSTGRES_USER: {{ .Values.secrets.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgres.password | quote }}
  POSTGRES_DB: {{ .Values.secrets.postgres.db | quote }}
  TIMESCALEDB_USER: {{ .Values.secrets.postgres.user | quote }}
  TIMESCALEDB_PASSWORD: {{ .Values.secrets.postgres.password | quote }}
  # Full connection string (base64 of postgresql://flotte:flotte123@postgres:5432/fleet)
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s:%s/%s" (.Values.secrets.postgres.user | b64dec) (.Values.secrets.postgres.password | b64dec) .Values.config.postgres.host .Values.config.postgres.port .Values.config.postgres.database | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fleet.keycloakSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fleet.labels" . | nindent 4 }}
type: Opaque
data:
  KEYCLOAK_ADMIN: {{ .Values.secrets.keycloak.adminUser | quote }}
  KEYCLOAK_ADMIN_PASSWORD: {{ .Values.secrets.keycloak.adminPassword | quote }}
