apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "fleet.fullname" . }}-db-migrate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fleet.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-migration
  annotations:
    # This hook runs BEFORE any other resource is installed
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db-migrate
        app.kubernetes.io/component: db-migration
        app.kubernetes.io/part-of: fleet-management
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "fleet.serviceAccountName" . }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres {{ .Values.postgres.port }}; do
                echo "Waiting for PostgreSQL at postgres:{{ .Values.postgres.port }}...";
                sleep 5;
              done;
              echo "PostgreSQL is ready."
      containers:
        - name: db-migrate
          image: "{{ .Values.vehicleService.image.repository }}:{{ .Values.vehicleService.image.tag }}"
          imagePullPolicy: {{ .Values.vehicleService.image.pullPolicy | default .Values.global.imagePullPolicy }}
          command:
            - sh
            - -c
            - |
              echo "Running database migrations..."
              node src/migrations/run.js || node -e "
                const { Pool } = require('pg');
                const pool = new Pool({
                  host: process.env.POSTGRES_HOST,
                  port: parseInt(process.env.POSTGRES_PORT),
                  database: process.env.POSTGRES_DB,
                  user: process.env.POSTGRES_USER,
                  password: process.env.POSTGRES_PASSWORD
                });
                pool.query('SELECT 1').then(() => {
                  console.log('DB connection OK — migrations placeholder');
                  pool.end();
                }).catch(err => {
                  console.error(err);
                  process.exit(1);
                });
              "
          envFrom:
            - configMapRef:
                name: {{ include "fleet.configmapName" . }}
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "fleet.postgresSecretName" . }}
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fleet.postgresSecretName" . }}
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
