# ── Gateway: allow in from ingress + frontend, allow out to all services ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "fleet.fullname" . }}-gateway-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fleet.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.gateway.port }}
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: fleet-management
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
