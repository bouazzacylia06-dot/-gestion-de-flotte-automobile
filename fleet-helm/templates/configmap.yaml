apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fleet.configmapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fleet.labels" . | nindent 4 }}
data:
  # ── Kafka ────────────────────────────────────────────────────────────────
  KAFKA_BROKER: {{ .Values.config.kafka.broker | quote }}
  KAFKA_VEHICLE_EVENTS_TOPIC: {{ .Values.config.kafka.topics.vehicleEvents | quote }}
  KAFKA_DRIVER_EVENTS_TOPIC: {{ .Values.config.kafka.topics.driverEvents | quote }}
  KAFKA_MAINTENANCE_EVENTS_TOPIC: {{ .Values.config.kafka.topics.maintenanceEvents | quote }}
  KAFKA_GEO_ALERTS_TOPIC: {{ .Values.config.kafka.topics.geoAlerts | quote }}
  KAFKA_FLEET_EVENTS_TOPIC: {{ .Values.config.kafka.topics.fleetEvents | quote }}

  # ── Database ─────────────────────────────────────────────────────────────
  POSTGRES_HOST: {{ .Values.config.postgres.host | quote }}
  POSTGRES_PORT: {{ .Values.config.postgres.port | quote }}
  POSTGRES_DB: {{ .Values.config.postgres.database | quote }}
  TIMESCALEDB_HOST: {{ .Values.config.postgres.host | quote }}
  TIMESCALEDB_PORT: {{ .Values.config.postgres.port | quote }}
  TIMESCALEDB_DB: {{ .Values.config.postgres.database | quote }}

  # ── OpenTelemetry ─────────────────────────────────────────────────────────
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.global.otel.endpoint | quote }}
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_METRICS_EXPORTER: "otlp"
  OTEL_LOG_LEVEL: {{ .Values.global.logLevel | quote }}

  # ── Keycloak ──────────────────────────────────────────────────────────────
  KEYCLOAK_URL: {{ .Values.global.keycloak.url | quote }}
  KEYCLOAK_REALM: {{ .Values.global.keycloak.realm | quote }}

  # ── Service URLs (for API Gateway) ────────────────────────────────────────
  VEHICLE_SERVICE_URL: "http://vehicle-service:{{ .Values.vehicleService.port }}"
  DRIVER_SERVICE_URL: "http://driver-service:{{ .Values.driverService.port }}"
  MAINTENANCE_SERVICE_URL: "http://maintenance-service:{{ .Values.maintenanceService.port }}"
  LOCATION_SERVICE_URL: "http://location-service:{{ .Values.locationService.port }}"
  EVENT_SERVICE_URL: "http://event-service:{{ .Values.eventService.port }}"

  # ── Miscellaneous ─────────────────────────────────────────────────────────
  NODE_ENV: "production"
  KAFKAJS_NO_PARTITIONER_WARNING: "1"
  LOG_LEVEL: {{ .Values.global.logLevel | quote }}
