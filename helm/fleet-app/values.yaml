global:
  imagePullPolicy: IfNotPresent
  keycloakUrl: "http://192.168.49.1:8080"
  keycloakRealm: "flotte"
  otelEndpoint: "http://otel-collector-opentelemetry-collector.flotte-observability.svc:4318"
  imagePullSecrets: []

namespaces:
  create: true

secrets:
  create: true
  dbSecretName: db-secrets
  dbUrl: "postgresql://postgres:postgres@postgresql:5432/fleet"

services:
  vehicule:
    enabled: true
    name: vehicule-service
    namespace: vehicule-ns
    replicas: 2
    appPort: 3000
    servicePort: 80
    image:
      repository: vehicule-service
      tag: latest
    ingress:
      enabled: true
      host: vehicule.local
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"
    hpa:
      enabled: false
      minReplicas: 2
      maxReplicas: 5
      cpuUtilization: 70

  conducteur:
    enabled: true
    name: conducteur-service
    namespace: conducteur-ns
    replicas: 2
    appPort: 3001
    servicePort: 80
    image:
      repository: conducteur-service
      tag: latest
    ingress:
      enabled: true
      host: conducteur.local
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"
    hpa:
      enabled: false
      minReplicas: 2
      maxReplicas: 5
      cpuUtilization: 70

  maintenance:
    enabled: true
    name: maintenance-service
    namespace: maintenance-ns
    replicas: 2
    appPort: 3002
    servicePort: 80
    image:
      repository: maintenance-service
      tag: latest
    ingress:
      enabled: true
      host: maintenance.local
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"
    hpa:
      enabled: false
      minReplicas: 2
      maxReplicas: 4
      cpuUtilization: 75

  localisation:
    enabled: true
    name: localisation-service
    namespace: localisation-ns
    replicas: 2
    appPort: 3003
    servicePort: 80
    image:
      repository: localisation-service
      tag: latest
    ingress:
      enabled: true
      host: localisation.local
    resources:
      requests:
        cpu: "150m"
        memory: "192Mi"
      limits:
        cpu: "300m"
        memory: "384Mi"
    hpa:
      enabled: false
      minReplicas: 2
      maxReplicas: 6
      cpuUtilization: 65

  evenement:
    enabled: true
    name: evenement-service
    namespace: evenement-ns
    replicas: 2
    appPort: 3004
    servicePort: 80
    image:
      repository: evenement-service
      tag: latest
    ingress:
      enabled: true
      host: evenement.local
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"
    hpa:
      enabled: false
      minReplicas: 2
      maxReplicas: 4
      cpuUtilization: 75
