{{- if .Values.secrets.create }}
{{- range $svcKey, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $.Values.secrets.dbSecretName }}
  namespace: {{ $svc.namespace }}
type: Opaque
stringData:
  url: {{ $.Values.secrets.dbUrl | quote }}
---
{{- end }}
{{- end }}
{{- end }}
