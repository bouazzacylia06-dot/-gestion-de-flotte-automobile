server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing : redirige toutes les routes vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache statique longue durée pour assets Vite (hash dans le nom)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Désactive les logs pour les health checks
    location /health {
        access_log off;
        return 200 "ok";
    }

    # Sécurité minimale
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
}
